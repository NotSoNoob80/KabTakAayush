  <!-- ============ LANDING — single non-scrolling viewport ============
       The whole home page lives in one screen: headline up top,
       the about copy sitting at middle-left, and a horizontal reel
       of frames drifting continuously along the bottom — the page
       itself never scrolls vertically. script.js animates the track
       at a constant speed and wraps its translation modulo half the
       track's width; the frame set is duplicated back-to-back so the
       loop repeats seamlessly forever, like a film reel feeding
       through a projector. Hover pauses it to study a frame. ======= -->

      </div>
    </div>
